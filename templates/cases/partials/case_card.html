<article class="case-card">
  <h2 class="case-card-title">
    {{ c.get_title_display }}
  </h2>

  <p class="case-card-line case-card-amount">
    Requested / Funded:<br>
    £{{ c.amount_requested }} / £{{ c.amount_funded }}
  </p>

  <p class="case-card-line case-card-status status-{{ c.status|lower|slugify }}">
    {{ c.get_status_display }}
  </p>

  <div class="case-card-button-wrap">
    <a href="{% url 'cases:detail' c.pk %}" class="case-card-button">
      VIEW
    </a>
  </div>
</article>
