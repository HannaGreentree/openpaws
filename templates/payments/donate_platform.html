{% extends "base.html" %} {% block content %}
<h1>Donate to the website balance</h1>

<p>
  Your donation goes to the platform balance. Admin allocates funds to approved
  cases.
</p>

<form method="post" action="{% url 'payments:donate_platform_checkout' %}">
  {% csrf_token %}
  <label for="amount"><strong>Amount (£):</strong></label>
  <input
    id="amount"
    name="amount"
    type="number"
    step="0.01"
    min="1"
    value="10"
  />
  <button type="submit">Donate</button>
</form>

<p style="margin-top: 12px">
  <a href="{% url 'payments:balance' %}">View platform balance</a>
</p>
{% endblock %}
